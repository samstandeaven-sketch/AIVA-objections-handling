let activeCat=null, activeObj=null;

function renderCats(){
  document.getElementById('cat-grid').innerHTML = data.map(c=>`
    <div class="cat-card" onclick="selectCat('${c.id}')"
      onmouseover="this.style.borderColor='${c.accentColor}'"
      onmouseout="this.style.borderColor='transparent'">
      <div class="cat-icon">${c.icon}</div>
      <h3>${c.name}</h3>
      <p>${c.desc}</p>
      <div class="badge" style="background:${c.badgeBg};color:${c.badgeColor}">${c.objections.length} objection${c.objections.length!==1?'s':''}</div>
      <div class="bar" style="background:${c.accentColor}"></div>
    </div>
  `).join('');
}

function selectCat(id){
  activeCat = data.find(c=>c.id===id);
  document.getElementById('obj-title').innerHTML = activeCat.icon+' '+activeCat.name;
  document.getElementById('obj-sub').textContent = "Select the objection that best matches what you're hearing.";
  document.getElementById('obj-list').innerHTML = activeCat.objections.map(o=>`
    <div class="obj-item" onclick="selectObj('${o.id}')"
      onmouseover="this.style.borderColor='${activeCat.accentColor}'"
      onmouseout="this.style.borderColor='transparent'">
      <span class="obj-item-text">${o.text}</span>
      <span class="obj-item-arrow" style="color:${activeCat.accentColor}">→</span>
    </div>
  `).join('');
  goTo('objs');
}

function selectObj(id){
  activeObj = activeCat.objections.find(o=>o.id===id);
  const ac = activeCat.accentColor;
  const hasDQ = activeObj.discoveryQuestions && activeObj.discoveryQuestions.length;

  const objBox = hasDQ
    ? `<div style="margin-bottom:22px"><label style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:${ac};display:block;margin-bottom:4px">Objection heard</label><p style="font-size:.95rem;font-weight:600;color:var(--dark)">${activeObj.text}</p></div>`
    : `<div class="tt-objection" style="border-color:${ac};background:#F7F8FC"><label style="color:${ac}">Objection heard</label><p>${activeObj.text}</p></div>`;

  let dqHtml = '';
  if(hasDQ){
    dqHtml = `<div class="tt-section">
      <h4><span class="dot" style="background:${ac}"></span>Follow-up Question + Talktrack</h4>
      <div class="dq-list">${activeObj.discoveryQuestions.map(dq=>`
        <div class="dq-item" style="border-color:${ac}">
          <div class="dq-q">❓ ${dq.q}</div>
          <div class="dq-fyi"><strong>FYI</strong>${dq.why}</div>
          ${dq.tt?`<div class="dq-tt" style="background:${activeCat.badgeBg};color:var(--dark2)">${dq.tt}</div>`:''}
        </div>
      `).join('')}</div>
    </div>`;
  }

  const ttSection = (!hasDQ && activeObj.talktrack) ? `
    <div class="tt-section">
      <h4><span class="dot" style="background:${ac}"></span>Suggested Response</h4>
      <div class="tt-body">${activeObj.talktrack}</div>
    </div>` : '';

  document.getElementById('tt-content').innerHTML = `${objBox}${dqHtml}${ttSection}`;
  goTo('tt');
}

function goTo(screen){
  ['cats','objs','tt'].forEach(s=>document.getElementById('screen-'+s).classList.add('hidden'));
  document.getElementById('screen-'+screen).classList.remove('hidden');
  updateBreadcrumb(screen);
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateBreadcrumb(screen){
  const bc = document.getElementById('breadcrumb');
  let html = ``;
  if(screen==='objs'||screen==='tt') html+=`<span class="sep">›</span><span class="bc-link" onclick="goTo('objs')">${activeCat?.name}</span>`;
  if(screen==='tt') html+=`<span class="sep">›</span><span style="color:var(--dark2)">Talk Track</span>`;
  bc.innerHTML = html;
}

renderCats();
updateBreadcrumb('cats');
</script>
